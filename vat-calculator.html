<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAT Calculator</title>
    <style>
        /* --- PERSONAL BRANDING VARIABLES --- */
        :root {
            --primary-accent: #6366f1;    /* Change this to your brand color (e.g., Indigo) */
            --bg-color: #f8fafc;          /* Your site's background color */
            --card-bg: #ffffff;           /* Calculator background */
            --text-main: #1e293b;         /* Main text color */
            --text-muted: #64748b;        /* Secondary/small text */
            --input-border: #e2e8f0;
            --radius: 16px;               /* Modern rounded corners */
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* Dark Mode Support (Optional - matches system preference) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --input-border: #334155;
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .calc-card {
            background: var(--card-bg);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--input-border);
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.025em;
        }

        .live-indicator {
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            background: var(--bg-color);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--input-border);
        }

        .dot {
            height: 6px;
            width: 6px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #10b981;
        }

        /* Tabs/Toggle */
        .mode-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--bg-color);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .mode-btn {
            padding: 10px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--card-bg);
            color: var(--primary-accent);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* Inputs */
        .field {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
        }

        .prefix {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            padding-left: 28px;
            background: var(--bg-color);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .rate-input { padding-left: 14px; } /* Rate doesn't need £ */

        /* Results Area */
        .display-area {
            background: linear-gradient(135deg, var(--primary-accent), #4f46e5);
            padding: 1.5rem;
            border-radius: 14px;
            color: white;
            margin-top: 1rem;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .result-item:last-child { margin-bottom: 0; }

        .result-label { font-size: 0.875rem; opacity: 0.9; }
        .result-val { font-weight: 600; font-size: 1.125rem; }
        .total-row {
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 0.75rem;
            margin-top: 0.75rem;
        }
        .total-row .result-val { font-size: 1.5rem; }
    </style>
</head>
<body>

<div class="calc-card">
    <div class="header">
        <h1>VAT Calculator</h1>
        <div class="live-indicator">
            <span class="dot"></span>
            <span id="rate-status">Syncing UK Rate...</span>
        </div>
    </div>

    <div class="mode-toggle">
        <button id="btn-add" class="mode-btn active" onclick="setMode('add')">Add VAT</button>
        <button id="btn-remove" class="mode-btn" onclick="setMode('remove')">Extract VAT</button>
    </div>

    <div class="field">
        <label id="amount-label">Amount (Net)</label>
        <div class="input-wrapper">
            <span class="prefix">£</span>
            <input type="number" id="amount" placeholder="0.00" step="0.01" oninput="calculate()">
        </div>
    </div>

    <div class="field">
        <label>VAT Rate (%)</label>
        <input type="number" id="vat-rate" class="rate-input" value="20" step="0.5" oninput="calculate()">
    </div>

    <div class="display-area">
        <div class="result-item">
            <span id="res-vat-label" class="result-label">VAT (20%)</span>
            <span id="res-vat-val" class="result-val">£0.00</span>
        </div>
        <div class="result-item total-row">
            <span id="res-total-label" class="result-label">Total Amount</span>
            <span id="res-total-val" class="result-val">£0.00</span>
        </div>
    </div>
</div>

<script>
    let mode = 'add';

    window.onload = async () => {
        const rateStatus = document.getElementById('rate-status');
        const rateInput = document.getElementById('vat-rate');

        try {
            const response = await fetch('https://api.vatlookup.eu/rates/gb');
            const data = await response.json();
            const standardRate = data.rates.find(r => r.name === "Standard").rates[0];
            
            if (standardRate) {
                rateInput.value = standardRate;
                rateStatus.innerText = `Live UK Rate: ${standardRate}%`;
            }
        } catch (e) {
            rateStatus.innerText = "UK Rate: 20% (Default)";
        }
        calculate();
    };

    function setMode(newMode) {
        mode = newMode;
        document.getElementById('btn-add').classList.toggle('active', mode === 'add');
        document.getElementById('btn-remove').classList.toggle('active', mode === 'remove');

        const amountLabel = document.getElementById('amount-label');
        const totalLabel = document.getElementById('res-total-label');

        if (mode === 'add') {
            amountLabel.innerText = "Amount (excluding VAT)";
            totalLabel.innerText = "Gross Total";
        } else {
            amountLabel.innerText = "Amount (including VAT)";
            totalLabel.innerText = "Net Amount";
        }
        calculate();
    }

    function calculate() {
        const amount = parseFloat(document.getElementById('amount').value) || 0;
        const rate = parseFloat(document.getElementById('vat-rate').value) || 0;
        
        document.getElementById('res-vat-label').innerText = `VAT (${rate}%)`;

        let vatAmount, finalTotal;

        if (mode === 'add') {
            vatAmount = amount * (rate / 100);
            finalTotal = amount + vatAmount;
        } else {
            const net = amount / (1 + (rate / 100));
            vatAmount = amount - net;
            finalTotal = net;
        }

        document.getElementById('res-vat-val').innerText = formatCurrency(vatAmount);
        document.getElementById('res-total-val').innerText = formatCurrency(finalTotal);
    }

    function formatCurrency(num) {
        return '£' + num.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }
</script>

</body>
</html>
