<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentage Calculator</title>
    <style>
        :root {
            --primary-accent: #6366f1; /* Indigo Brand Color */
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --input-border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* --- REMOVE UP/DOWN ARROWS (SPINNERS) --- */
        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            letter-spacing: -0.025em;
        }

        .calc-row {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--input-border);
            margin-bottom: 1rem;
            
            /* Grid ensures perfect vertical alignment of buttons and boxes */
            display: grid;
            grid-template-columns: 1fr auto 140px; 
            align-items: center;
            gap: 20px;
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        input {
            padding: 10px 12px;
            background: var(--bg-color);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            width: 80px;
            text-align: center;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        button {
            background-color: var(--primary-accent);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .result-area {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: flex-end;
        }

        .output-box {
            background: #f1f5f9;
            font-weight: 700;
            color: var(--primary-accent);
            width: 90px;
            cursor: default;
        }

        .multiplier-note {
            grid-column: 1 / span 3;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: -10px;
            font-style: italic;
            min-height: 1.2em;
        }

        @media (max-width: 768px) {
            .calc-row { grid-template-columns: 1fr; text-align: center; }
            .input-area, .result-area { justify-content: center; flex-wrap: wrap; }
            button { width: 100%; }
            .multiplier-note { text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Percentage Calculator</h1>

    <!-- Row 1 -->
    <div class="calc-row">
        <div class="input-area">
            <span>What is</span>
            <input type="number" id="c1_p">
            <span>% of</span>
            <input type="number" id="c1_v">
            <span>?</span>
        </div>
        <button onclick="calc1()">Calculate</button>
        <div class="result-area">
            <input type="text" id="c1_res" class="output-box" readonly>
        </div>
    </div>

    <!-- Row 2 -->
    <div class="calc-row">
        <div class="input-area">
            <input type="number" id="c2_v1">
            <span>is what percent of</span>
            <input type="number" id="c2_v2">
            <span>?</span>
        </div>
        <button onclick="calc2()">Calculate</button>
        <div class="result-area">
            <input type="text" id="c2_res" class="output-box" readonly>
            <span>%</span>
        </div>
    </div>

    <!-- Row 3 -->
    <div class="calc-row">
        <div class="input-area">
            <span>Percentage increase/decrease from</span>
            <input type="number" id="c3_v1">
            <span>to</span>
            <input type="number" id="c3_v2">
            <span>?</span>
        </div>
        <button onclick="calc3()">Calculate</button>
        <div class="result-area">
            <input type="text" id="c3_res" class="output-box" readonly>
            <span>%</span>
        </div>
        <div id="multiplier-display" class="multiplier-note"></div>
    </div>
</div>

<script>
    const fmt = (n) => parseFloat(n.toFixed(2)).toLocaleString();

    function calc1() {
        const p = parseFloat(document.getElementById('c1_p').value);
        const v = parseFloat(document.getElementById('c1_v').value);
        if (!isNaN(p) && !isNaN(v)) {
            document.getElementById('c1_res').value = fmt((p / 100) * v);
        }
    }

    function calc2() {
        const v1 = parseFloat(document.getElementById('c2_v1').value);
        const v2 = parseFloat(document.getElementById('c2_v2').value);
        if (!isNaN(v1) && !isNaN(v2) && v2 !== 0) {
            document.getElementById('c2_res').value = fmt((v1 / v2) * 100);
        }
    }

    function calc3() {
        const v1 = parseFloat(document.getElementById('c3_v1').value);
        const v2 = parseFloat(document.getElementById('c3_v2').value);
        const mDisplay = document.getElementById('multiplier-display');

        if (!isNaN(v1) && !isNaN(v2) && v1 !== 0) {
            const diff = v2 - v1;
            document.getElementById('c3_res').value = fmt((diff / v1) * 100);

            const times = (v2 / v1).toFixed(2);
            const direction = v2 >= v1 ? "increase" : "decrease";
            mDisplay.innerText = `The new value is ${times}x the original (a ${direction})`;
        } else {
            mDisplay.innerText = "";
        }
    }

    // Enter Key Support
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') e.target.closest('.calc-row').querySelector('button').click();
        });
    });
</script>

</body>
</html>
